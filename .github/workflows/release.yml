name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=1.0.$(date +'%Y%m%d.%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Create zip archive
        run: |
          zip -r recipes.zip . \
            --exclude '.git/*' \
            --exclude '.github/*'

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: recipes.zip
          generate_release_notes: true
